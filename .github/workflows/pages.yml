name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build library
        run: npm run build

      - name: Prepare Pages site
        run: |
          mkdir -p _site
          cp -r demo/* _site/
          cp -r dist _site/dist
          # Rewrite imports: demo imports ../dist/ but on Pages dist/ is a sibling
          sed -i "s|from '../dist/|from './dist/|g" _site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
