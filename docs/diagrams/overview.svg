  <text x="170.7115" y="212.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="170.7115" dy="-3.9000000000000012">2 Segmentation</tspan><tspan x="170.7115" dy="16.900000000000002">MediaPipe → confidence mask</tspan></text>
</g>
