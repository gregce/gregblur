</g>
<g class="node" data-id="F" data-label="6 Mask-Weighted Blur
2-pass separable Gaussian" data-shape="rectangle">
  <rect x="68.59700000000002" y="593" width="204.22899999999996" height="53.800000000000004" rx="0" ry="0" fill="#06b6d4" stroke="#0e7490" stroke-width="0.75" />
  <text x="170.7115" y="619.9" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="170.7115" dy="-3.9000000000000012">6 Mask-Weighted Blur</tspan><tspan x="170.7115" dy="16.900000000000002">2-pass separable Gaussian</tspan></text>
</g>
<g class="node" data-id="G" data-label="7 Composite
Smoothstep blend via matte" data-shape="rectangle">
  <rect x="72.30200000000002" y="694.8000000000001" width="196.81899999999996" height="53.800000000000004" rx="0" ry="0" fill="#f43f5e" stroke="#be123c" stroke-width="0.75" />
  <text x="170.7115" y="721.7" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="170.7115" dy="-3.9000000000000012">7 Composite</tspan><tspan x="170.7115" dy="16.900000000000002">Smoothstep blend via matte</tspan></text>
</g>
<g class="node" data-id="H" data-label="8 Output
Canvas → MediaStreamTrack" data-shape="rectangle">
  <rect x="63.41000000000001" y="796.6" width="214.60299999999998" height="53.800000000000004" rx="0" ry="0" fill="#6366f1" stroke="#4338ca" stroke-width="0.75" />
  <text x="170.7115" y="823.5" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="170.7115" dy="-3.9000000000000012">8 Output</tspan><tspan x="170.7115" dy="16.900000000000002">Canvas → MediaStreamTrack</tspan></text>
</g>
</svg>