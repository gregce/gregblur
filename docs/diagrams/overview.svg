  <text x="170.7115" y="416.3" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="170.7115" dy="-3.9000000000000012">4 Temporal Blend</tspan><tspan x="170.7115" dy="16.900000000000002">EMA with previous frame&#39;s mask</tspan></text>
</g>
