<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 894.6379999999999 193.8" width="894.6379999999999" height="193.8" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="upload" data-label="Stage 1: Upload">
  <rect x="40" y="40" width="814.6379999999999" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="814.6379999999999" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Stage 1: Upload</text>
</g>
<polyline class="edge" data-from="CAM" data-to="FT" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="texImage2D" points="207.618,110.9 367.916,110.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FT" data-to="FOF" data-style="solid" data-arrow-start="false" data-arrow-end="true" data-label="VERTEX_SHADER
(Y-flip)" points="489.894,110.9 687.02,110.9" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="edge-label" data-from="CAM" data-to="FT" data-label="texImage2D">
  <rect x="251.618" y="94.9" width="72.298" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="287.767" y="110.05000000000001" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">texImage2D</text>
</g>
<g class="edge-label" data-from="FT" data-to="FOF" data-label="VERTEX_SHADER
(Y-flip)">
  <rect x="533.894" y="87.9" width="109.12599999999999" height="44.6" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="588.457" y="110.2" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)"><tspan x="588.457" dy="-3.3000000000000007">VERTEX_SHADER</tspan><tspan x="588.457" dy="14.3">(Y-flip)</tspan></text>
</g>
<g class="node" data-id="CAM" data-label="Camera Frame
(TexImageSource)" data-shape="rectangle">
  <rect x="56" y="84" width="151.618" height="53.800000000000004" rx="0" ry="0" fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.75" />
  <text x="131.809" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="131.809" dy="-3.9000000000000012">Camera Frame</tspan><tspan x="131.809" dy="16.900000000000002">(TexImageSource)</tspan></text>
</g>
<g class="node" data-id="FT" data-label="frameTexture
(RGBA)" data-shape="rectangle">
  <rect x="367.916" y="84" width="121.978" height="53.800000000000004" rx="0" ry="0" fill="#60a5fa" stroke="#2563eb" stroke-width="0.75" />
  <text x="428.905" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="428.905" dy="-3.9000000000000012">frameTexture</tspan><tspan x="428.905" dy="16.900000000000002">(RGBA)</tspan></text>
</g>
<g class="node" data-id="FOF" data-label="frameOrientedFBO
(normalised)" data-shape="rectangle">
  <rect x="687.02" y="84" width="151.618" height="53.800000000000004" rx="0" ry="0" fill="#93c5fd" stroke="#3b82f6" stroke-width="0.75" />
  <text x="762.829" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#1e3a5f"><tspan x="762.829" dy="-3.9000000000000012">frameOrientedFBO</tspan><tspan x="762.829" dy="16.900000000000002">(normalised)</tspan></text>
</g>
</svg>