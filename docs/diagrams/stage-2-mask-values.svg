<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 776.968 514.3" width="776.968" height="514.3" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="bilateral" data-label="Stage 3: Joint Bilateral Filter">
  <rect x="40" y="173.8" width="360.27199999999993" height="300.5" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="173.8" width="360.27199999999993" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="187.8" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Stage 3: Joint Bilateral Filter</text>
</g>
<g class="subgraph" data-id="weights" data-label="Per-Sample Weighting">
  <rect x="40" y="40" width="696.968" height="113.80000000000001" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="696.968" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Per-Sample Weighting</text>
</g>
<polyline class="edge" data-from="RAW_MASK" data-to="SHADER" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="298.4595,271.6 298.4595,295.6 209.39149999999998,295.6 209.39149999999998,319.6" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="GUIDE" data-to="SHADER" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="120.3235,271.6 120.3235,295.6 209.39149999999998,295.6 209.39149999999998,319.6" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SHADER" data-to="REFINED" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="209.39149999999998,356.5 209.39149999999998,404.5" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="SW" data-to="CW" data-style="solid" data-arrow-start="false" data-arrow-end="false" points="233.55299999999997,110.9 281.553,110.9" fill="none" stroke="var(--_line)" stroke-width="1" />
<polyline class="edge" data-from="CW" data-to="FW" data-style="solid" data-arrow-start="false" data-arrow-end="false" points="500.602,110.9 548.602,110.9" fill="none" stroke="var(--_line)" stroke-width="1" />
<g class="node" data-id="RAW_MASK" data-label="Raw Confidence Mask
(bg confidence)" data-shape="rectangle">
  <rect x="212.647" y="217.8" width="171.62499999999997" height="53.800000000000004" rx="0" ry="0" fill="#8b5cf6" stroke="#6d28d9" stroke-width="0.75" />
  <text x="298.4595" y="244.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="298.4595" dy="-3.9000000000000012">Raw Confidence Mask</tspan><tspan x="298.4595" dy="16.900000000000002">(bg confidence)</tspan></text>
</g>
<g class="node" data-id="SHADER" data-label="BILATERAL_FILTER_SHADER" data-shape="rectangle">
  <rect x="93.5685" y="319.6" width="231.64599999999996" height="36.900000000000006" rx="0" ry="0" fill="#ec4899" stroke="#be185d" stroke-width="0.75" />
  <text x="209.39149999999998" y="338.05" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff" dy="4.55">BILATERAL_FILTER_SHADER</text>
</g>
<g class="node" data-id="GUIDE" data-label="Original Frame
(colour guide)" data-shape="rectangle">
  <rect x="56" y="217.8" width="128.647" height="53.800000000000004" rx="0" ry="0" fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.75" />
  <text x="120.3235" y="244.70000000000002" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="120.3235" dy="-3.9000000000000012">Original Frame</tspan><tspan x="120.3235" dy="16.900000000000002">(colour guide)</tspan></text>
</g>
<g class="node" data-id="REFINED" data-label="Refined Foreground Mask
(inverted: 1.0 = person)" data-shape="rectangle">
  <rect x="110.982" y="404.5" width="196.819" height="53.800000000000004" rx="0" ry="0" fill="#f472b6" stroke="#db2777" stroke-width="0.75" />
  <text x="209.3915" y="431.4" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="209.3915" dy="-3.9000000000000012">Refined Foreground Mask</tspan><tspan x="209.3915" dy="16.900000000000002">(inverted: 1.0 = person)</tspan></text>
</g>
<g class="node" data-id="SW" data-label="Spatial Weight
exp(−dist²/2σ²_space)" data-shape="rectangle">
  <rect x="56" y="84" width="177.55299999999997" height="53.800000000000004" rx="0" ry="0" fill="#fbbf24" stroke="#d97706" stroke-width="0.75" />
  <text x="144.7765" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#1e3a5f"><tspan x="144.7765" dy="-3.9000000000000012">Spatial Weight</tspan><tspan x="144.7765" dy="16.900000000000002">exp(−dist²/2σ²_space)</tspan></text>
</g>
<g class="node" data-id="CW" data-label="Colour Weight
exp(−colourDist²/2σ²_colour)" data-shape="rectangle">
  <rect x="281.553" y="84" width="219.049" height="53.800000000000004" rx="0" ry="0" fill="#fbbf24" stroke="#d97706" stroke-width="0.75" />
  <text x="391.0775" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#1e3a5f"><tspan x="391.0775" dy="-3.9000000000000012">Colour Weight</tspan><tspan x="391.0775" dy="16.900000000000002">exp(−colourDist²/2σ²_colour)</tspan></text>
</g>
<g class="node" data-id="FW" data-label="Final = spatial × colour" data-shape="rectangle">
  <rect x="548.602" y="92.45" width="172.366" height="36.900000000000006" rx="0" ry="0" fill="#f59e0b" stroke="#b45309" stroke-width="0.75" />
  <text x="634.785" y="110.9" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff" dy="4.55">Final = spatial × colour</text>
</g>
</svg>