  <text x="837.6374999999999" y="116.67500000000001" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="837.6374999999999" dy="-3.9000000000000012">Previous Mask</tspan><tspan x="837.6374999999999" dy="16.900000000000002">(prevMaskFBO)</tspan></text>
</g>
