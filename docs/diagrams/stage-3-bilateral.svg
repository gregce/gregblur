<polyline class="edge" data-from="PREV" data-to="BLEND" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="768.8679999999999,125.64166666666668 732.8679999999999,125.64166666666668 732.8679999999999,130.9 468.14199999999994,130.9 468.14199999999994,125.64166666666668 456.14199999999994,125.64166666666668" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
