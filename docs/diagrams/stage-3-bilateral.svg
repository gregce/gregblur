<g class="edge-label" data-from="FINAL" data-to="PREV" data-label="copy">
  <rect x="683.458" y="86.44999999999999" width="41.41" height="30.3" rx="2" ry="2" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="1" />
  <text x="704.163" y="101.6" text-anchor="middle" font-size="11" font-weight="400" fill="var(--_text-sec)" dy="3.8499999999999996">copy</text>
</g>
