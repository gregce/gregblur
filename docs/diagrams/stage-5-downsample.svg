<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 788.0829999999999 340.5" width="788.0829999999999" height="340.5" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="5" refX="7" refY="2.5" orient="auto">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="5" refX="1" refY="2.5" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.5, 8 5" fill="var(--_arrow)" stroke="var(--_arrow)" stroke-width="0.75" stroke-linejoin="round" />
  </marker>
</defs>
<g class="subgraph" data-id="composite" data-label="Stage 7: Composite">
  <rect x="40" y="40" width="708.0829999999999" height="260.5" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="40" y="40" width="708.0829999999999" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="52" y="54" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">Stage 7: Composite</text>
</g>
<polyline class="edge" data-from="BG_BLUR" data-to="COMP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="227.25449999999995,257.6 247.73474999999996,257.6 247.73474999999996,175.79999999999998 268.215,175.79999999999998" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="ORIG" data-to="COMP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="222.06749999999994,175.8 247.73474999999996,175.8 247.73474999999996,175.79999999999998 268.215,175.79999999999998" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="FMASK" data-to="COMP" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="213.1755,102.45 247.73474999999996,102.45 247.73474999999996,175.79999999999998 268.215,175.79999999999998" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="COMP" data-to="OUT" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="483.5589999999999,175.8 531.559,175.8" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<g class="node" data-id="BG_BLUR" data-label="Blurred Background
(bgBlurPongFBO)" data-shape="rectangle">
  <rect x="63.03949999999999" y="230.70000000000002" width="164.21499999999997" height="53.800000000000004" rx="0" ry="0" fill="#22d3ee" stroke="#0e7490" stroke-width="0.75" />
  <text x="145.147" y="257.6" text-anchor="middle" font-size="13" font-weight="500" fill="#1e3a5f"><tspan x="145.147" dy="-3.9000000000000012">Blurred Background</tspan><tspan x="145.147" dy="16.900000000000002">(bgBlurPongFBO)</tspan></text>
</g>
<g class="node" data-id="COMP" data-label="COMPOSITE_SHADER
alpha = smoothstep(0.26, 0.72,
clamp(mask + 0.035, 0, 1))" data-shape="rectangle">
  <rect x="268.215" y="140.45" width="215.34399999999994" height="70.7" rx="0" ry="0" fill="#f43f5e" stroke="#be123c" stroke-width="0.75" />
  <text x="375.88699999999994" y="175.79999999999998" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="375.88699999999994" dy="-12.350000000000001">COMPOSITE_SHADER</tspan><tspan x="375.88699999999994" dy="16.900000000000002">alpha = smoothstep(0.26, 0.72,</tspan><tspan x="375.88699999999994" dy="16.900000000000002">clamp(mask + 0.035, 0, 1))</tspan></text>
</g>
<g class="node" data-id="ORIG" data-label="Original Frame
(frameOrientedFBO)" data-shape="rectangle">
  <rect x="63.03949999999999" y="148.9" width="159.02799999999996" height="53.800000000000004" rx="0" ry="0" fill="#3b82f6" stroke="#1d4ed8" stroke-width="0.75" />
  <text x="142.55349999999999" y="175.8" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff"><tspan x="142.55349999999999" dy="-3.9000000000000012">Original Frame</tspan><tspan x="142.55349999999999" dy="16.900000000000002">(frameOrientedFBO)</tspan></text>
</g>
<g class="node" data-id="FMASK" data-label="Foreground Mask" data-shape="rectangle">
  <rect x="63.03949999999999" y="84" width="150.136" height="36.900000000000006" rx="0" ry="0" fill="#fbbf24" stroke="#92400e" stroke-width="0.75" />
  <text x="138.1075" y="102.45" text-anchor="middle" font-size="13" font-weight="500" fill="#1e3a5f" dy="4.55">Foreground Mask</text>
</g>
<g class="node" data-id="OUT" data-label="mix(blurred, original, alpha)" data-shape="rectangle">
  <rect x="531.559" y="157.35" width="200.524" height="36.900000000000006" rx="0" ry="0" fill="#fb7185" stroke="#e11d48" stroke-width="0.75" />
  <text x="631.8209999999999" y="175.8" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff" dy="4.55">mix(blurred, original, alpha)</text>
</g>
</svg>